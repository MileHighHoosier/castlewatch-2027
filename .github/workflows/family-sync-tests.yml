name: Family sync reliability

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backend contract tests
        run: python -m unittest discover -s tests -v

      - name: Compile production modules
        run: python -m py_compile app.py family_trip.py operations.py accounts_auth.py accounts_schema.py accounts_access.py accounts_routes.py
